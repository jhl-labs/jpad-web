name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://jpad:jpad_test@localhost:5432/jpad_test
  NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3000
  APP_ENCRYPTION_KEY: ci-test-encryption-key-do-not-use
  REDIS_URL: redis://localhost:6379
  WS_SECRET: ci-test-ws-secret

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Run unit tests
        run: bun test tests/unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jpad
          POSTGRES_PASSWORD: jpad_test
          POSTGRES_DB: jpad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        run: bunx prisma db push --url "$DATABASE_URL"

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Build
        run: bun run build

  e2e:
    name: E2E Tests
    if: false  # E2E requires full app environment — run locally or in staging
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jpad
          POSTGRES_PASSWORD: jpad_test
          POSTGRES_DB: jpad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        run: bunx prisma db push --url "$DATABASE_URL"

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          DISABLE_RATE_LIMITS: "1"
          AUTH_ALLOW_CREDENTIALS_LOGIN: "1"
          AUTH_ALLOW_SELF_SIGNUP: "1"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for known vulnerabilities
        run: bun pm audit 2>&1 || true

      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" src/ tests/ --include="*.ts" --include="*.tsx" || echo "No real API keys found (test keys are OK)"
          ! grep -rn "AKIA[A-Z0-9]\{16\}" src/ --include="*.ts" --include="*.tsx" || echo "No real AWS keys found (test keys are OK)"
          echo "Security scan passed"
