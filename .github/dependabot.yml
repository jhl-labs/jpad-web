version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      blocknote:
        patterns:
          - "@blocknote/*"
      mantine:
        patterns:
          - "@mantine/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "infrastructure"
