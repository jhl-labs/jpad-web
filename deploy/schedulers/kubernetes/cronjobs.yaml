apiVersion: batch/v1
kind: CronJob
metadata:
  name: jpad-audit-log-deliveries
  namespace: jpad
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: audit-log-deliveries
              image: ghcr.io/example/jpad:latest
              imagePullPolicy: IfNotPresent
              workingDir: /app
              command:
                - /bin/bash
                - -lc
                - ./deploy/scripts/run-scheduled-job.sh audit-log-deliveries
              env:
                - name: JPAD_ROOT
                  value: /app
                - name: JPAD_ENV_FILE
                  value: /app/.env
                - name: JPAD_ALLOW_MISSING_ENV_FILE
                  value: "1"
                - name: AUDIT_LOG_DELIVERY_LIMIT
                  value: "50"
              envFrom:
                - secretRef:
                    name: jpad-app-env
              volumeMounts:
                - name: jpad-data
                  mountPath: /app/data
          volumes:
            - name: jpad-data
              persistentVolumeClaim:
                claimName: jpad-data
---
