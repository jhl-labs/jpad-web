services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jpad
      POSTGRES_PASSWORD: jpad_dev_password
      POSTGRES_DB: jpad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jpad_minio
      MINIO_ROOT_PASSWORD: jpad_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"
    volumes:
      - clamavdata:/var/lib/clamav

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "18080:8080"
    volumes:
      - ./deploy/idp/keycloak/realm-import:/opt/keycloak/data/import:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  qdrantdata:
