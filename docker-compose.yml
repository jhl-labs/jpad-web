services:
  jpad:
    image: ghcr.io/jhl-labs/jpad-web:latest
    ports:
      - "${APP_PORT:-3000}:3000"
      - "${WS_HOST_PORT:-1234}:1234"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://jpad:jpad_dev_password@postgres:5432/jpad
      REDIS_URL: redis://redis:6379
    volumes:
      - jpad-data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jpad
      POSTGRES_PASSWORD: jpad_dev_password
      POSTGRES_DB: jpad
    ports:
      - "25432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpad"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jpad_minio
      MINIO_ROOT_PASSWORD: jpad_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # 선택적 서비스 — 필요 시 --profile 옵션으로 활성화
  # docker compose --profile clamav --profile qdrant up -d
  clamav:
    image: clamav/clamav:stable
    profiles: [clamav]
    ports:
      - "3310:3310"
    volumes:
      - clamavdata:/var/lib/clamav

  qdrant:
    image: qdrant/qdrant:v1.13.6
    profiles: [qdrant]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    profiles: [keycloak]
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "18080:8080"
    volumes:
      - ./deploy/idp/keycloak/realm-import:/opt/keycloak/data/import:ro

volumes:
  jpad-data:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  qdrantdata:
