  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stylized notepad/document icon -->
  <rect x="140" y="96" width="232" height="320" rx="24" fill="#ffffff" opacity="0.95"/>
  <rect x="140" y="96" width="232" height="64" rx="24" fill="#ffffff"/>
  <rect x="140" y="136" width="232" height="280" rx="0" fill="#ffffff" opacity="0.95"/>
  <rect x="140" y="392" width="232" height="24" rx="24" fill="#ffffff" opacity="0.95"/>
  <!-- Lines representing text -->
  <rect x="180" y="170" width="152" height="12" rx="6" fill="#2563eb" opacity="0.6"/>
  <rect x="180" y="200" width="120" height="12" rx="6" fill="#2563eb" opacity="0.4"/>
